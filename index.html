<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandu - Tasks & Focus</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for compiling JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Import Maps ONLY for React and Icons -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.294.0?deps=react@18.2.0"
        }
    }
    </script>

    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-200 overflow-hidden">
    
    <!-- Fallback UI: If you see this for more than 3 seconds, an import failed in the Network tab -->
    <div id="root" class="min-h-screen flex items-center justify-center">
        <div class="text-center animate-pulse">
            <h2 class="text-2xl font-bold text-neutral-500 mb-2">Booting Pandu OS...</h2>
            <p class="text-xs text-neutral-600">Resolving core modules</p>
        </div>
    </div>

    <script type="text/babel" data-type="module">
        // 1. Direct Imports (Bypassing ESM Maps for maximum stability)
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        import { 
          CheckCircle2, Circle, Mic, Plus, Settings, LayoutDashboard, MessageSquare, 
          Search, Bell, Sparkles, FolderSync, Mail, HardDrive, ChevronRight, Menu, RefreshCw,
          Activity, ShieldCheck, Send, Check, X, AlertTriangle, Loader2, LogOut
        } from 'lucide-react';

        console.log("All modules imported successfully. Starting React engine...");

        const firebaseConfig = {
    apiKey: "AIzaSyAaUhv5MbxtPlGj-h5qOl5UnB0UUAaTOBE",
    authDomain: "pandu-tasks.firebaseapp.com",
    projectId: "pandu-tasks",
    storageBucket: "pandu-tasks.firebasestorage.app",
    messagingSenderId: "157159875958",
    appId: "1:157159875958:web:b4acf1fbd71c976f9d0657",
    measurementId: "G-85NLZDP50J"
  };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'pandu-todo-default';

        // --- IndexedDB Cache Engine for Audio ---
        const DB_NAME = 'PanduAudioDB';
        const STORE_NAME = 'audioBlobs';

        const initDB = () => {
          return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME);
            request.onsuccess = (e) => resolve(e.target.result);
            request.onerror = (e) => reject(e.target.error);
          });
        };

        const saveToCache = async (id, blob) => {
          try {
            const db = await initDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            tx.objectStore(STORE_NAME).put(blob, id);
          } catch (e) { console.error("Cache save failed:", e); }
        };

        const getFromCache = async (id) => {
          try {
            const db = await initDB();
            return new Promise((resolve, reject) => {
              const tx = db.transaction(STORE_NAME, 'readonly');
              const request = tx.objectStore(STORE_NAME).get(id);
              request.onsuccess = () => resolve(request.result);
              request.onerror = () => reject(request.error);
            });
          } catch (e) { return null; }
        };

        // --- Custom CSS Animations ---
        const AnimatedWaveform = () => (
            <div className="flex items-center gap-1 h-4">
                {[1, 2, 3, 4].map(i => (
                    <div key={i} className="w-1 bg-red-500 rounded-full animate-pulse" 
                         style={{ height: '100%', animationDelay: `${i * 0.15}s`, animationDuration: '0.8s' }}></div>
                ))}
            </div>
        );

        const SyncOrbit = () => (
            <div className="relative w-4 h-4 flex items-center justify-center">
                <div className="absolute w-full h-full border border-indigo-500/30 rounded-full animate-[spin_3s_linear_infinite]"></div>
                <div className="absolute w-2 h-2 bg-indigo-500 rounded-full blur-[2px] animate-pulse"></div>
            </div>
        );

        // --- Main App Component ---
        function App() {
          const [user, setUser] = useState(null);
          const [googleToken, setGoogleToken] = useState(null);
          const [loading, setLoading] = useState(true);
          
          const [tasks, setTasks] = useState([]);
          const [contextData, setContextData] = useState({ emails: [], files: [] });
          const [view, setView] = useState('wizard'); // 'wizard', 'dashboard', 'tasks', 'history', 'chat', 'settings'
          const [toast, setToast] = useState(null);
          const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
          const [isSyncing, setIsSyncing] = useState(false);
          
          const [settings, setSettings] = useState({
            wizardCompleted: false,
            aiProvider: 'groq',
            aiEnhanceDefault: true,
            webhookUrl: ''
          });

          useEffect(() => {
            const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
              setUser(currentUser);
              setLoading(false);
              const storedToken = sessionStorage.getItem('pandu_google_token');
              if (storedToken) setGoogleToken(storedToken);
            });
            return () => unsubscribe();
          }, []);

          // Auto Morning Sweep Logic
          useEffect(() => {
            if (user && settings.webhookUrl && view === 'dashboard') {
              const lastSweep = localStorage.getItem('pandu_last_auto_sweep');
              const now = new Date();
              const todayStr = now.toDateString();
              
              if (now.getHours() >= 5 && now.getHours() <= 12 && lastSweep !== todayStr) {
                handleManualSync();
                localStorage.setItem('pandu_last_auto_sweep', todayStr);
                showToast("Good morning! Sweeping latest context...", "info");
              }
            }
          }, [user, settings.webhookUrl, view]);

          const handleLogin = async () => {
            const provider = new GoogleAuthProvider();
            provider.addScope('https://www.googleapis.com/auth/drive.file');
            try {
              const result = await signInWithPopup(auth, provider);
              const credential = GoogleAuthProvider.credentialFromResult(result);
              setGoogleToken(credential.accessToken);
              sessionStorage.setItem('pandu_google_token', credential.accessToken);
            } catch (error) {
              console.error("Login failed", error);
              showToast("Login failed. Check console.", "error");
            }
          };

          const handleLogout = () => {
            sessionStorage.removeItem('pandu_google_token');
            signOut(auth);
          };

          const handleManualSync = async () => {
            if (!settings.webhookUrl) {
              showToast("Webhook URL not configured in Settings.", "error");
              return;
            }
            setIsSyncing(true);
            try {
              await fetch(`${settings.webhookUrl}?uid=${user.uid}`, { mode: 'no-cors' });
              setTimeout(() => {
                setIsSyncing(false);
                showToast("Context swept successfully.", "success");
              }, 2000);
            } catch (err) {
              setIsSyncing(false);
              showToast("Failed to reach background script.", "error");
            }
          };

          useEffect(() => {
            if (!user) return;

            const settingsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'config', 'userSettings');
            const unsubSettings = onSnapshot(settingsRef, (docSnap) => {
              if (docSnap.exists()) {
                const data = docSnap.data();
                setSettings(data);
                if (data.wizardCompleted && view === 'wizard') setView('dashboard');
              } else {
                setView('wizard');
              }
            });

            const tasksRef = collection(db, 'artifacts', appId, 'users', user.uid, 'tasks');
            const unsubTasks = onSnapshot(tasksRef, (snapshot) => {
              const fetchedTasks = [];
              snapshot.forEach(doc => fetchedTasks.push({ id: doc.id, ...doc.data() }));
              fetchedTasks.sort((a, b) => b.createdAt - a.createdAt);
              setTasks(fetchedTasks);
            });

            const contextRef = doc(db, 'artifacts', appId, 'users', user.uid, 'context', 'latest');
            const unsubContext = onSnapshot(contextRef, (docSnap) => {
              if (docSnap.exists()) {
                const data = docSnap.data();
                setContextData({
                  emails: data.emails ? JSON.parse(data.emails) : [],
                  files: data.files ? JSON.parse(data.files) : []
                });
              }
            });

            return () => { unsubSettings(); unsubTasks(); unsubContext(); };
          }, [user]);

          const showToast = (message, type = 'info') => {
            setToast({ message, type });
            setTimeout(() => setToast(null), 4000);
          };

          const addTask = async (payload) => {
            if (!user) return;
            const { text, useAi, inputType, driveFileId } = payload;
            
            let finalTaskData = {
              title: text || "Audio Recording",
              originalText: text || "",
              completed: false,
              aiEnhanced: false,
              tags: [],
              createdAt: Date.now(),
              inputType: inputType || 'text',
              type: 'task',
              driveFileId: driveFileId || null
            };

            if (useAi && text) {
              showToast("Organizing with AI...", "info");
              await new Promise(r => setTimeout(r, 1500)); // Mock AI processing
              let isContextMatched = text.toLowerCase().includes('@drive') || text.toLowerCase().includes('mail');
              finalTaskData = { 
                  ...finalTaskData, 
                  title: text.charAt(0).toUpperCase() + text.slice(1) + (isContextMatched ? " (AI Synced)" : ""),
                  tags: ['AI Processed'],
                  isAiProcessed: true,
                  hasDriveContext: isContextMatched
              };
            }

            const taskRef = doc(collection(db, 'artifacts', appId, 'users', user.uid, 'tasks'));
            await setDoc(taskRef, finalTaskData);
            showToast(inputType === 'voice' ? "Voice note saved to Drive!" : "Task added.");
          };

          const toggleTask = async (taskId, currentStatus) => {
            if (!user) return;
            await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'tasks', taskId), {
              completed: !currentStatus,
              completedAt: !currentStatus ? Date.now() : null
            });
          };

          const deleteTask = async (taskId) => {
            if (!user) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'tasks', taskId));
          };

          if (loading) {
            return <div className="min-h-screen bg-neutral-950 flex items-center justify-center text-white"><Loader2 className="w-8 h-8 animate-spin text-indigo-500" /></div>;
          }

          if (!user) {
            return (
              <div className="min-h-screen bg-neutral-950 flex flex-col items-center justify-center p-4 overflow-hidden relative">
                <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-500/10 rounded-full blur-[100px]"></div>
                <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-emerald-500/10 rounded-full blur-[100px]"></div>
                
                <img src="logo_panda.jpg" alt="Pandu Logo" className="w-32 h-32 object-contain mix-blend-screen filter invert mb-4 z-10" />
                <img src="logo_text.jpg" alt="Pandu Tasks" className="h-8 object-contain mix-blend-screen filter invert mb-12 z-10" />

                <div className="max-w-md w-full bg-neutral-900/50 backdrop-blur-xl border border-neutral-800 rounded-3xl p-8 text-center space-y-8 shadow-2xl relative z-10">
                  <div>
                    <h1 className="text-2xl font-bold text-white mb-2 tracking-tight">Access Workspace</h1>
                    <p className="text-neutral-400 text-sm">Your personal, zero-cost AI productivity engine.</p>
                  </div>
                  <button onClick={handleLogin} className="w-full bg-white text-black font-semibold text-sm p-4 rounded-xl hover:bg-neutral-200 transition-all flex items-center justify-center gap-3">
                    Continue with Google
                  </button>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-neutral-950 text-neutral-200 flex">
              {toast && (
                <div className="fixed top-6 right-6 z-50 animate-in fade-in slide-in-from-top-4 duration-300">
                  <div className="bg-neutral-900/90 backdrop-blur-md border border-neutral-800 shadow-2xl rounded-xl p-4 flex items-center gap-3">
                    {toast.type === 'success' ? <CheckCircle2 className="text-emerald-500 w-5 h-5" /> : 
                     toast.type === 'error' ? <X className="text-red-400 w-5 h-5" /> : 
                     <Activity className="text-indigo-400 w-5 h-5" />}
                    <p className="text-sm font-medium">{toast.message}</p>
                  </div>
                </div>
              )}

              {view === 'wizard' && <SetupWizard onComplete={(s) => { setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'config', 'userSettings'), {...settings, ...s, wizardCompleted: true}); setView('dashboard');}} user={user} />}

              {view !== 'wizard' && (
                <>
                  <aside className={`fixed lg:static top-0 left-0 h-full w-64 border-r border-neutral-800/50 bg-neutral-950/80 backdrop-blur-xl flex flex-col transition-transform duration-300 z-50 ${mobileMenuOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                    <div className="h-20 flex items-center justify-between px-6 border-b border-neutral-800/50">
                      <img src="logo_text.jpg" alt="Pandu" className="h-6 object-contain mix-blend-screen filter invert" />
                      <button onClick={() => setMobileMenuOpen(false)} className="lg:hidden text-neutral-400"><X className="w-5 h-5" /></button>
                    </div>
                    
                    <nav className="flex-1 p-4 space-y-1 overflow-y-auto">
                      <NavItem iconSrc="icon_dashboard.jpg" label="Dashboard" active={view === 'dashboard'} onClick={() => {setView('dashboard'); setMobileMenuOpen(false);}} />
                      <NavItem iconSrc="icon_tasks.jpg" label="Tasks & Voice" active={view === 'tasks'} onClick={() => {setView('tasks'); setMobileMenuOpen(false);}} />
                      <NavItem iconSrc="icon_chat.jpg" label="AI Copilot" active={view === 'chat'} onClick={() => {setView('chat'); setMobileMenuOpen(false);}} />
                      <NavItem iconSrc="icon_history.jpg" label="Archive" active={view === 'history'} onClick={() => {setView('history'); setMobileMenuOpen(false);}} />
                      
                      <div className="pt-6 pb-2 px-3 text-xs font-semibold text-neutral-600 uppercase tracking-wider">System</div>
                      <NavItem iconSrc="icon_settings.jpg" label="Settings" active={view === 'settings'} onClick={() => {setView('settings'); setMobileMenuOpen(false);}} />
                    </nav>

                    <div className="p-4 border-t border-neutral-800/50">
                      <div className="flex items-center justify-between p-3 rounded-xl bg-neutral-900/50 border border-neutral-800/50">
                        <div className="flex items-center gap-3 overflow-hidden">
                          <div className="w-8 h-8 rounded-full bg-neutral-800 flex items-center justify-center text-xs font-bold text-white border border-neutral-700">
                            {user.displayName?.charAt(0) || "U"}
                          </div>
                          <div className="truncate">
                            <p className="text-xs font-medium text-white truncate">{user.displayName || "User"}</p>
                            <p className="text-[10px] text-emerald-400 truncate flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Synced</p>
                          </div>
                        </div>
                        <button onClick={handleLogout} className="p-2 text-neutral-500 hover:text-red-400 transition-colors">
                          <LogOut className="w-4 h-4" />
                        </button>
                      </div>
                    </div>
                  </aside>

                  <main className="flex-1 flex flex-col relative h-screen overflow-y-auto bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-neutral-900/20 via-neutral-950 to-neutral-950">
                    <header className="h-20 border-b border-neutral-800/50 flex items-center justify-between px-4 lg:px-8 sticky top-0 bg-neutral-950/80 backdrop-blur-md z-30">
                      <div className="flex items-center gap-3 text-neutral-400">
                        <button onClick={() => setMobileMenuOpen(true)} className="lg:hidden p-1 hover:text-white"><Menu className="w-6 h-6" /></button>
                        <span className="capitalize font-medium text-white hidden sm:block">{view}</span>
                        <ChevronRight className="w-4 h-4 text-neutral-600 hidden sm:block" />
                        <span className="text-sm">Workspace</span>
                      </div>
                      <div className="flex items-center gap-4">
                        {googleToken ? (
                           <span className="hidden sm:flex items-center gap-2 text-xs font-medium bg-emerald-500/10 text-emerald-400 px-3 py-1.5 rounded-full border border-emerald-500/20">
                             <HardDrive className="w-3 h-3" /> Linked
                           </span>
                        ) : (
                           <button onClick={handleLogin} className="hidden sm:flex items-center gap-2 text-xs font-medium bg-red-500/10 text-red-400 px-3 py-1.5 rounded-full border border-red-500/20">
                             <AlertTriangle className="w-3 h-3" /> Link Drive
                           </button>
                        )}
                      </div>
                    </header>

                    <div className="p-4 lg:p-8 max-w-5xl mx-auto w-full pb-32">
                      {view === 'tasks' && <TasksView tasks={tasks} onAdd={addTask} onToggle={toggleTask} onDelete={deleteTask} settings={settings} googleToken={googleToken} />}
                      {view === 'history' && <HistoryView tasks={tasks} onToggle={toggleTask} onDelete={deleteTask} googleToken={googleToken} />}
                      {view === 'dashboard' && <DashboardView tasks={tasks} contextData={contextData} onSync={handleManualSync} isSyncing={isSyncing} />}
                      {view === 'chat' && <ChatView />}
                      {view === 'settings' && <SettingsView settings={settings} onUpdate={(newSet) => setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'config', 'userSettings'), newSet)} />}
                    </div>
                  </main>
                </>
              )}
            </div>
          );
        }

        // --- View Components ---

        function NavItem({ iconSrc, label, active, onClick }) {
          return (
            <button onClick={onClick} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all duration-200 group ${active ? 'bg-neutral-800/80 text-white shadow-sm' : 'hover:bg-neutral-900/50 text-neutral-400 hover:text-neutral-200'}`}>
              <img src={iconSrc} alt={label} className={`w-6 h-6 object-contain mix-blend-screen filter invert transition-transform ${active ? 'scale-110' : 'group-hover:scale-110 opacity-70 group-hover:opacity-100'}`} />
              <span className="font-medium text-sm">{label}</span>
            </button>
          );
        }

        function TasksView({ tasks, onAdd, onToggle, onDelete, settings, googleToken }) {
          const [inputText, setInputText] = useState('');
          const [aiEnhance, setAiEnhance] = useState(settings.aiEnhanceDefault);
          const [isRecording, setIsRecording] = useState(false);
          const [recordingTime, setRecordingTime] = useState(0);
          const mediaRecorderRef = useRef(null);
          const audioChunksRef = useRef([]);
          const timerRef = useRef(null);

          const handleSubmit = (e) => {
            e.preventDefault();
            if (!inputText.trim()) return;
            onAdd({ text: inputText, useAi: aiEnhance, inputType: 'text' });
            setInputText('');
          };

          const startRecording = async () => {
            try {
              const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
              const mediaRecorder = new MediaRecorder(stream);
              mediaRecorderRef.current = mediaRecorder;
              audioChunksRef.current = [];

              mediaRecorder.ondataavailable = (event) => { if (event.data.size > 0) audioChunksRef.current.push(event.data); };
              mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
                await handleAudioUpload(audioBlob);
              };

              mediaRecorder.start();
              setIsRecording(true);
              setRecordingTime(0);
              timerRef.current = setInterval(() => setRecordingTime(p => p + 1), 1000);
            } catch (err) { alert("Microphone access denied."); }
          };

          const stopRecording = () => {
            if (mediaRecorderRef.current && isRecording) {
              mediaRecorderRef.current.stop();
              mediaRecorderRef.current.stream.getTracks().forEach(track => track.stop());
              setIsRecording(false);
              clearInterval(timerRef.current);
            }
          };

          const handleAudioUpload = async (blob) => {
            if (!googleToken) { alert("Session expired. Link Drive first."); return; }
            try {
              const uploadRes = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=media', {
                method: 'POST', headers: { 'Authorization': `Bearer ${googleToken}`, 'Content-Type': 'audio/webm' }, body: blob
              });
              const fileData = await uploadRes.json();
              await fetch(`https://www.googleapis.com/drive/v3/files/${fileData.id}`, {
                method: 'PATCH', headers: { 'Authorization': `Bearer ${googleToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: `Pandu_Voice_${Date.now()}.webm` })
              });
              await saveToCache(fileData.id, blob);
              onAdd({ text: `Voice Note (${recordingTime}s)`, useAi: aiEnhance, inputType: 'voice', driveFileId: fileData.id });
            } catch (err) { console.error(err); alert("Upload failed."); }
          };

          const pendingTasks = tasks.filter(t => !t.completed);

          return (
            <div className="space-y-8 animate-in fade-in duration-500">
              <div className={`bg-neutral-900/60 backdrop-blur-md border ${isRecording ? 'border-red-500/50 shadow-[0_0_30px_rgba(239,68,68,0.15)]' : 'border-neutral-800'} rounded-3xl p-4 transition-all duration-300`}>
                <form onSubmit={handleSubmit} className="flex flex-col gap-3">
                  {isRecording ? (
                    <div className="h-[60px] flex items-center justify-between px-4 bg-red-500/5 rounded-2xl border border-red-500/10">
                       <div className="flex items-center gap-4">
                         <AnimatedWaveform />
                         <span className="text-red-400 font-mono text-lg">{recordingTime}s</span>
                       </div>
                       <button type="button" onClick={stopRecording} className="bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-red-600 transition-colors">Stop & Save</button>
                    </div>
                  ) : (
                    <textarea value={inputText} onChange={(e) => setInputText(e.target.value)} placeholder="Type a task, mention @Drive, or drop a link..." className="bg-transparent border-none outline-none text-lg text-white placeholder:text-neutral-600 w-full px-2 resize-none" rows="2" />
                  )}

                  {!isRecording && (
                    <div className="flex justify-between border-t border-neutral-800/80 pt-3 mt-1">
                      <button type="button" onClick={startRecording} className="p-2 rounded-xl hover:bg-neutral-800 transition-colors group">
                        <img src="icon_mic.jpg" className="w-6 h-6 object-contain mix-blend-screen filter invert opacity-70 group-hover:opacity-100 transition-opacity" alt="Mic" />
                      </button>
                      
                      <div className="flex items-center gap-5">
                        <label className="flex items-center gap-2 text-sm text-neutral-400 cursor-pointer hover:text-neutral-200">
                          <div className={`w-4 h-4 rounded border flex items-center justify-center transition-colors ${aiEnhance ? 'bg-white border-white text-black' : 'border-neutral-600'}`}>
                            {aiEnhance && <Check className="w-3 h-3" />}
                          </div>
                          AI Enhance
                        </label>
                        <button disabled={!inputText.trim()} type="submit" className="bg-white text-black px-5 py-2 rounded-xl font-medium flex items-center gap-2 hover:bg-neutral-200 disabled:opacity-50 transition-all">
                          Add <Plus className="w-4 h-4" />
                        </button>
                      </div>
                    </div>
                  )}
                </form>
              </div>

              {pendingTasks.length === 0 ? (
                  <div className="flex flex-col items-center justify-center py-24 text-center">
                    <img src="illust_empty_tasks.jpg" alt="Zen Panda" className="w-64 h-64 object-contain mix-blend-screen mb-6 drop-shadow-2xl hover:-translate-y-2 transition-transform duration-500" />
                    <h3 className="text-xl font-semibold text-white mb-2">Total Peace.</h3>
                    <p className="text-neutral-500 max-w-sm text-sm">Your workspace is clear. Add a task or relax.</p>
                  </div>
              ) : (
                  <div className="space-y-3">
                    {pendingTasks.map(task => <TaskCard key={task.id} task={task} onToggle={onToggle} onDelete={onDelete} googleToken={googleToken} />)}
                  </div>
              )}
            </div>
          );
        }

        function HistoryView({ tasks, onToggle, onDelete, googleToken }) {
          const completedTasks = tasks.filter(t => t.completed);

          return (
            <div className="space-y-6 animate-in fade-in duration-500">
              <h2 className="text-2xl font-bold text-white mb-6">Archive</h2>
              {completedTasks.length === 0 ? (
                <div className="flex flex-col items-center justify-center py-20 text-center">
                  <img src="illust_empty_history.jpg" alt="Waving Panda" className="w-64 h-64 object-contain mix-blend-screen mb-6 opacity-80" />
                  <p className="text-neutral-500 text-sm">No completed tasks yet. Get to work!</p>
                </div>
              ) : (
                <div className="space-y-3 opacity-70 hover:opacity-100 transition-opacity duration-300">
                  {completedTasks.map(task => <TaskCard key={task.id} task={task} onToggle={onToggle} onDelete={onDelete} googleToken={googleToken} />)}
                </div>
              )}
            </div>
          );
        }

        function TaskCard({ task, onToggle, onDelete, googleToken }) {
          const [audioUrl, setAudioUrl] = useState(null);
          
          useEffect(() => {
            if (task.inputType === 'voice' && task.driveFileId && googleToken) {
              const loadAudio = async () => {
                const cachedBlob = await getFromCache(task.driveFileId);
                if (cachedBlob) { setAudioUrl(URL.createObjectURL(cachedBlob)); return; }
                try {
                  const res = await fetch(`https://www.googleapis.com/drive/v3/files/${task.driveFileId}?alt=media`, { headers: { 'Authorization': `Bearer ${googleToken}` }});
                  const blob = await res.blob();
                  await saveToCache(task.driveFileId, blob);
                  setAudioUrl(URL.createObjectURL(blob));
                } catch (err) {}
              };
              loadAudio();
            }
          }, [task, googleToken]);

          return (
            <div className="group flex flex-col sm:flex-row sm:items-start gap-4 p-5 rounded-2xl border border-neutral-800/80 bg-neutral-900/40 hover:bg-neutral-900/80 transition-all duration-300 relative">
              <div className="flex items-start gap-4 w-full">
                <button onClick={() => onToggle(task.id, task.completed)} className="mt-0.5 text-neutral-500 hover:text-white transition-colors">
                  {task.completed ? <CheckCircle2 className="w-6 h-6 text-emerald-500" /> : <Circle className="w-6 h-6" />}
                </button>
                <div className="flex-1 min-w-0 pr-8 sm:pr-0">
                  <p className={`text-base font-medium ${task.completed ? 'text-neutral-500 line-through' : 'text-neutral-200'}`}>{task.title}</p>
                  
                  {task.inputType === 'voice' && audioUrl && (
                    <div className="mt-4 mb-2 p-2 rounded-xl border border-neutral-800 bg-neutral-950/50 inline-block">
                      <audio controls src={audioUrl} className="h-8 w-64 grayscale opacity-80 hover:opacity-100 transition-opacity" />
                    </div>
                  )}
                </div>
              </div>
              <button onClick={() => onDelete(task.id)} className="absolute top-4 right-4 sm:static sm:opacity-0 sm:group-hover:opacity-100 p-2 text-neutral-500 hover:text-red-400 transition-all">
                <X className="w-4 h-4" />
              </button>
            </div>
          );
        }

        function DashboardView({ tasks, contextData, onSync, isSyncing }) {
          const completed = tasks.filter(t => t.completed).length;
          const progress = tasks.length === 0 ? 0 : Math.round((completed / tasks.length) * 100);

          return (
            <div className="space-y-8 animate-in fade-in duration-500">
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div className="bg-neutral-900/60 border border-neutral-800 p-6 rounded-3xl relative overflow-hidden">
                  <h3 className="text-neutral-400 font-medium mb-1">Completion</h3>
                  <p className="text-5xl font-bold text-white mb-6">{progress}%</p>
                  <div className="w-full bg-neutral-950 rounded-full h-2.5 border border-neutral-800">
                    <div className="bg-white h-full rounded-full transition-all duration-1000" style={{ width: `${progress}%` }}></div>
                  </div>
                </div>

                <div className="bg-neutral-900/60 p-6 rounded-3xl border border-neutral-800 lg:col-span-2">
                  <div className="flex justify-between items-start mb-4">
                    <h3 className="text-neutral-400 font-medium">Live Background Sweeps</h3>
                    <button onClick={onSync} disabled={isSyncing} className="p-2 text-neutral-400 hover:text-white transition-colors disabled:opacity-50">
                      <RefreshCw className={`w-5 h-5 ${isSyncing ? 'animate-spin text-indigo-400' : ''}`} />
                    </button>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                     <div className="flex items-center justify-between p-4 rounded-xl bg-neutral-950 border border-neutral-800">
                        <div className="flex items-center gap-3">
                          {isSyncing ? <SyncOrbit /> : <Mail className="w-4 h-4 text-neutral-400" />}
                          <span className="text-sm font-medium text-neutral-200">Gmail</span>
                        </div>
                        <span className="text-xs font-mono text-neutral-500">{contextData.emails?.length || 0} active</span>
                     </div>
                     <div className="flex items-center justify-between p-4 rounded-xl bg-neutral-950 border border-neutral-800">
                        <div className="flex items-center gap-3">
                          {isSyncing ? <SyncOrbit /> : <HardDrive className="w-4 h-4 text-neutral-400" />}
                          <span className="text-sm font-medium text-neutral-200">Drive</span>
                        </div>
                        <span className="text-xs font-mono text-neutral-500">{contextData.files?.length || 0} active</span>
                     </div>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        function ChatView() {
          return (
            <div className="h-[calc(100vh-140px)] flex flex-col border border-neutral-800 rounded-3xl bg-neutral-900/30 animate-in fade-in duration-500">
              <div className="flex-1 p-6 flex flex-col justify-center items-center text-center">
                  <img src="illust_ai_chat.jpg" alt="Cyber Panda" className="w-48 h-48 object-contain mix-blend-screen mb-6 drop-shadow-2xl" />
                  <p className="text-neutral-300 max-w-sm text-sm leading-relaxed">I am monitoring your workspace. Ask me to find a document, summarize a thread, or draft a response.</p>
              </div>
              <div className="p-4 bg-neutral-950/80 border-t border-neutral-800">
                <div className="flex items-center gap-3 bg-neutral-900 border border-neutral-700 rounded-2xl px-4 py-3 focus-within:border-neutral-500 transition-colors">
                  <input type="text" placeholder="Ask Pandu..." className="flex-1 bg-transparent border-none outline-none text-sm text-white" />
                  <button className="text-neutral-400 hover:text-white"><Send className="w-5 h-5" /></button>
                </div>
              </div>
            </div>
          );
        }

        function SettingsView({ settings, onUpdate }) {
          return (
            <div className="max-w-2xl space-y-8 animate-in fade-in duration-500">
              <h2 className="text-2xl font-semibold text-white mb-6">System Config</h2>
              <div className="bg-neutral-900/60 border border-neutral-800 rounded-3xl p-6 space-y-5">
                <div>
                  <label className="text-sm font-medium text-white block mb-2">Webhook Integration (Optional)</label>
                  <p className="text-xs text-neutral-500 mb-3">Paste your Google Apps Script Web App URL here to enable the manual Sync Button and Morning Sweeps.</p>
                  <input type="text" value={settings.webhookUrl || ''} onChange={(e) => onUpdate({ ...settings, webhookUrl: e.target.value })} placeholder="https://script.google.com/macros/s/.../exec" className="w-full bg-neutral-950 border border-neutral-800 rounded-xl p-3 text-sm text-white outline-none focus:border-neutral-500 transition-colors" />
                </div>
              </div>
            </div>
          );
        }

        function SetupWizard({ onComplete, user }) {
          return (
            <div className="fixed inset-0 bg-neutral-950 z-50 flex items-center justify-center p-4">
              <div className="w-full max-w-2xl bg-neutral-900 border border-neutral-800 rounded-[2rem] p-10 text-center animate-in zoom-in-95 duration-500">
                <img src="illust_security.jpg" alt="Lock Panda" className="w-48 h-48 object-contain mix-blend-screen mx-auto mb-6" />
                <h2 className="text-3xl font-bold text-white mb-2">Secure Setup</h2>
                <p className="text-neutral-400 text-sm mb-8">Your Database ID: <code className="bg-neutral-950 px-2 py-1 rounded text-emerald-400">{user?.uid || 'Loading...'}</code></p>
                <button onClick={() => onComplete({ wizardCompleted: true })} className="w-full bg-white text-black font-semibold p-4 rounded-xl hover:bg-neutral-200">
                  Enter Workspace
                </button>
              </div>
            </div>
          );
        }

        // Mount React safely
        try {
            const root = createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (error) {
            console.error("React failed to render:", error);
            document.getElementById('root').innerHTML = `<div style="color:red;text-align:center;padding:2rem;">Fatal React Error: Check Console.</div>`;
        }
    </script>
</body>
</html>
